[package]
name = "lb-role-github-workflow"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
# Roles depend on host, never the reverse. This crate owns the *background driver* that drives the
# host's `relay_outbox` + `react_to_approvals` on a tick — the host owns the verbs, this owns the loop
# (the same layering as the gateway/webhook roles). No network deps of its own: the `Target` (the
# GitHub HTTP client) is `lb-role-github-target`, supplied by the caller behind the host trait.
lb-host.workspace = true
lb-auth.workspace = true
tokio.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "time"] }
lb-inbox.workspace = true
lb-outbox.workspace = true
lb-jobs.workspace = true
lb-store.workspace = true
