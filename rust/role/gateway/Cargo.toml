[package]
name = "lb-role-gateway"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
# `test_gateway_seed.rs` is a `#[path]` MODULE of the `test_gateway` bin, not a bin itself — but it
# lives under `src/bin/`, where cargo's bin autodiscovery would otherwise compile it as a standalone
# (featureless) target and fail (it needs the `test-harness`-only `lb-outbox`). Disable autodiscovery
# and declare the one real bin explicitly below.
autobins = false

[dependencies]
lb-host.workspace = true
lb-mcp.workspace = true
lb-run-events.workspace = true
lb-auth.workspace = true
lb-registry.workspace = true
lb-devkit.workspace = true
lb-inbox.workspace = true
lb-insights.workspace = true
lb-prefs.workspace = true
lb-assets.workspace = true
lb-apikey.workspace = true
# Only the `test_gateway` harness binary uses lb-outbox (to seed real effects). It is optional and
# pulled in by the `test-harness` feature, so the production crate doesn't carry it.
lb-outbox = { workspace = true, optional = true }
# Only the `test_gateway` harness uses lb-ext-loader (to parse the proof-panel manifest's requested
# caps when it installs+loads the real wasm for the host-callback live test). Optional, test-only.
lb-ext-loader = { workspace = true, optional = true }
# Only the `test_gateway` harness uses lb-flows (the `NodeBlock` shape the flow_node seed writes so
# `flows.nodes` returns a real extension node). Optional, test-only.
lb-flows = { workspace = true, optional = true }
# Only the `test_gateway` harness uses lb-telemetry (the `TelemetryRecord` shape the telemetry seed
# writes so the console reads real rows over `telemetry.query`/`tail`). Optional, test-only.
lb-telemetry = { workspace = true, optional = true }
axum.workspace = true
tower-http.workspace = true
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
futures.workspace = true
rand.workspace = true

[features]
# Enables the test-only `test_gateway` binary (the UI real-gateway Vitest harness) + its seed deps.
test-harness = ["dep:lb-outbox", "dep:lb-ext-loader", "dep:lb-flows", "dep:lb-telemetry"]

# The real-node harness binary the UI's `vitest.gateway.config.ts` spawns. Test-only: build it with
# `cargo build -p lb-role-gateway --features test-harness --bin test_gateway`.
[[bin]]
name = "test_gateway"
required-features = ["test-harness"]

[dev-dependencies]
# The active-agent-wiring route test loads the durable agent-session job back to prove it lands in the
# caller's workspace (the hard wall) — `lb_jobs::load(store, ws, id)` is ws-scoped.
lb-jobs.workspace = true
lb-outbox.workspace = true
lb-registry.workspace = true
lb-supervisor.workspace = true
# The native-sidecar → host MCP callback transport under test: the callback test drives THIS client
# against the REAL gateway over real HTTP (native-callback-transport scope), proving the child→host
# path with no mocks (testing §0).
lb-sidecar-client.workspace = true
ed25519-dalek.workspace = true
# The federation happy-path gateway test seeds a REAL on-disk SQLite file with real rows (the
# sanctioned sqlite test source — testing §0), then queries it through the real federation sidecar.
# `bundled` compiles its own SQLite C (links via zigcc here) so no system sqlite/toolchain is needed.
rusqlite = { version = "0.37", features = ["bundled"] }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "time"] }
tower = { version = "0.5", features = ["util"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"] }
http-body-util = "0.1"
# The webhooks integration test signs HMAC-SHA256 deliveries independently (so the verifier is
# checked against an independent computation of the MAC). Test-only — the production gateway never
# verifies HMAC itself (that lives in `lb-host::webhook::verify`); this is the test's own signer.
hmac.workspace = true
sha2.workspace = true
