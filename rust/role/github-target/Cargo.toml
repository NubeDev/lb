[package]
name = "lb-role-github-target"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
# Roles depend on host, never the reverse. The host owns the `Target` trait (the outbox's delivery
# seam); this crate supplies the real GitHub-HTTP impl. `reqwest` lives here, never in core `lb-host`
# — exactly like `HttpSource` in `lb-role-registry-host`.
lb-host.workspace = true
lb-outbox.workspace = true
reqwest.workspace = true
serde.workspace = true
serde_json.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "time"] }
# A fake GitHub origin on an ephemeral port (the only external mocked, testing §3) — the same
# axum-serve-on-127.0.0.1:0 harness `http_source_test.rs` uses. The relay runs over a real
# in-memory store; no Node/bus needed (the relay is pure store + the `Target` seam).
axum.workspace = true
lb-store.workspace = true
# The close-the-loop test drives the host reactor (`react_to_approvals`) end to end into this
# adapter, so it needs to mint a principal, approve, and read the job back. Test-only — the adapter
# itself depends only on the host `Target` trait + `lb-outbox`.
lb-auth.workspace = true
lb-inbox.workspace = true
lb-jobs.workspace = true
