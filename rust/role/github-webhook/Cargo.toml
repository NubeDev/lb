[package]
name = "lb-role-github-webhook"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
# Roles depend on host, never the reverse. This crate is the live HTTP ingress that drives the
# host's `ingest_via_bridge` (github-bridge slice) — axum/hmac live here, never in core `lb-host`.
lb-host.workspace = true
# The ingest principal's type (a core crate, like the gateway role uses). Not a role dep — roles
# still never depend on roles.
lb-auth.workspace = true
axum.workspace = true
hmac.workspace = true
sha2.workspace = true
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "time"] }
# The tests install the real `github-bridge` wasm through the registry and mint the ingest principal,
# so the POST is proven end to end (HMAC → normalize → inbox write), not just at the signature seam.
ed25519-dalek.workspace = true
lb-registry.workspace = true
lb-inbox.workspace = true
# Drive the router without a socket for the deny/bad-signature/isolation tests.
tower = { version = "0.5", features = ["util"] }
