# Build tuning to stop the machine freezing during Rust builds.
#
# Why: this box has 31 GB RAM + 28 cores. cargo's default = one build job per
# core (28). The RAM-heavy LINK step (`rust-lld`) can run on several big crates
# at once at ~4 GB each, blow past 31 GB RAM, fill the tiny 2 GB swap, and
# thrash into a frozen desktop. The knobs below cap peak memory.
[build]
# Number of parallel codegen/build jobs. Lower = less peak RAM.
# With debug info trimmed (see [profile.dev] in Cargo.toml) 8 is comfortable on
# 31 GB. Drop back to 6 or 4 if you still see freezes during big rebuilds.
jobs = 8

# --- C compiler + linker: zig cc ---
# This box has NO system C compiler / `cc` / gcc on PATH and no root to
# apt-install one. `ring` (and other C deps) need a real C compiler to build
# their C+asm, and rustc needs a `cc`-style driver to link. We use a
# self-contained zig toolchain (~/.local/zig-linux-x86_64-0.13.0) whose
# clang-based `zig cc` both compiles C and links — no system toolchain required.
#
#   ~/.local/bin/zigcc  ->  `zig cc`  (also rewrites the gnu target triple
#                           x86_64-unknown-linux-gnu -> zig's x86_64-linux-gnu)
#   ~/.local/bin/zigar  ->  `zig ar`
#
# zig's bundled lld does the linking, so the old mold `-fuse-ld=mold` flag is
# gone. If you install a real gcc/clang later, delete this block and the [env]
# CC/AR below to fall back to the system toolchain.
[target.x86_64-unknown-linux-gnu]
linker = "/home/user/.local/bin/zigcc"

# cc-rs (for C deps like ring) reads CC/AR from the environment. Setting them
# here means `cargo build` Just Works with no shell exports.
[env]
CC = "/home/user/.local/bin/zigcc"
AR = "/home/user/.local/bin/zigar"
CC_x86_64_unknown_linux_gnu = "/home/user/.local/bin/zigcc"
