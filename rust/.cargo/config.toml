# Build tuning to stop the machine freezing during Rust builds.
#
# Why: this box has 31 GB RAM + 28 cores. cargo's default = one build job per
# core (28). The RAM-heavy LINK step (`rust-lld`) can run on several big crates
# at once at ~4 GB each, blow past 31 GB RAM, fill the tiny 2 GB swap, and
# thrash into a frozen desktop. The knobs below cap peak memory.
[build]
# Number of parallel codegen/build jobs. Lower = less peak RAM.
# With debug info trimmed (see [profile.dev] in Cargo.toml) 8 is comfortable on
# 31 GB. Drop back to 6 or 4 if you still see freezes during big rebuilds.
jobs = 8

# Host C toolchain: this box has NO system C compiler (`cc`/`gcc`/`clang` are all
# absent), so cargo's default linker `cc` fails with "linker `cc` not found" the
# moment any crate with a build script or C dependency (serde_json, proc-macro2,
# zmij, icu_*, …) links. The zig shims in ~/.local/bin provide a drop-in C
# toolchain; point the host target at them so the linker resolves.
#
# Scoped to the host triple (not [build]) so it only affects host artifacts; the
# wasm32 guest target links with rust-lld and is unaffected.
[target.x86_64-unknown-linux-gnu]
linker = "/home/user/.local/bin/zigcc"

[env]
CC = "/home/user/.local/bin/zigcc"
AR = "/home/user/.local/bin/zigar"
RANLIB = "/home/user/.local/bin/zigranlib"
