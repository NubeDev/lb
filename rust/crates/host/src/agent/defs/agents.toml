# Built-in agent-definition manifest (agent-catalog scope). Boot-seeded into the reserved `_lb_agents`
# namespace, read-only to users. Each `[[agent]]` is a named `(runtime, model_endpoint)` preset. The
# id is stamped `builtin.<id>` by the seeder — do NOT include the prefix here.
#
# NAMES ONLY: `api_key_env` is the NAME of an env var, never the key value. The key stays in the node
# env / lb-secrets. Model ids are provider data — a drift is a one-line edit + re-seed, no code change.
#
# Nine built-ins, all over the `zaicoding` coding endpoint (ZAI_API_KEY) — the token has balance only on
# the coding endpoint, which serves the full Z.AI model line (the standard `api.z.ai/api/paas/v4` endpoint
# answers "Insufficient balance" for it). Three groups:
#   - in-house coding (runtime `default`): glm-4.6 / glm-5.1 / glm-5.2 — for code-heavy agent work.
#   - in-house general (runtime `default`): glm-4.5-air / glm-4.5 / glm-5-turbo — faster + cheaper, for
#     non-code platform work (widgets, dashboards, data analysis, SQL).
#   - open-interpreter (runtime `open-interpreter-default`): glm-4.6 / glm-5.1 / glm-5.2 (external-agent
#     feature). A node without the feature still seeds these but filters them from the catalog list
#     (registry drift — symmetric, no `if cloud`).

# --- In-house coding models (runtime `default`) ---

[[agent]]
id = "in-house-glm-4.6"
label = "In-house — Z.AI GLM-4.6"
description = "The in-house agent loop over Z.AI GLM-4.6 (coding endpoint)."
runtime = "default"
[agent.model_endpoint]
provider = "zaicoding"
model = "glm-4.6"
api_key_env = "ZAI_API_KEY"
base_url = "https://api.z.ai/api/coding/paas/v4"

