# The `ros` driver extension — manages a fleet of ROS (Rubix) REST appliances. A native Tier-2 sidecar
# (owns long-lived HTTP connections + a poll-timer loop → its own PID). Backend (src/) + a federated
# shadcn/Tailwind-v4 page (ui/) in ONE folder, the fleet-monitor pattern. ROS vocabulary lives ONLY
# here — the core sees generic MCP verbs, `ingest.write` samples, and outbox effects (ingest scope's
# "IoT is one caller" rule). Authoritative scope: docs/ros-scope.md.
#
# STUB — the shape below is scope-time intent (docs/ros-scope.md → "MCP surface"); the implementing
# session confirms + fills tool descriptors, the [ui] block, and node.config schemas against a live run.
[extension]
id          = "ros"
version     = "0.1.0"
name        = "ROS"
description = "Manage a fleet of ROS (Rubix) REST appliances — CRUD, a reusable poller, and setpoint writes."

[runtime]
tier        = "native"                          # owns HTTP connections + a poll loop → Tier-2 (own PID)
world       = "lazybones:ext/extension@0.1.0"   # WIT major checked at load (ABI gate)
placement   = "either"                          # place it where it can reach the appliances (config/role)

[native]
exec        = "ros-sidecar"
args        = []
restart     = "on-crash"

[capabilities]
# Requested here; the live grant is requested ∩ admin-approved at install. The poll task calls
# ingest.write; point writes stage outbox effects; the External token is mediated by lb-secrets.
request = [
  "net:tcp:*:*",                 # reach the ROS appliances over HTTP (the native net:* escape hatch)
  # The External token per connection, mediated by lb-secrets (three-gate). Write on create/update,
  # get to build a client, delete on ros.delete. The token is NEVER returned by get/list or logged.
  "secret:ros/*/token:get",
  "secret:ros/*/token:write",
  "secret:ros/*/token:delete",
  "mcp:secret.set:call",         # stash the connection token
  "mcp:secret.get:call",         # read it to construct the REST client
  "mcp:secret.delete:call",      # remove it on ros.delete
  # The config shadow (ros connection records) rides the host's workspace-scoped document store —
  # there is no generic "put a record" host verb; assets.* IS the key→doc store (see shadow.rs).
  "mcp:assets.put_doc:call",
  "mcp:assets.get_doc:call",
  "mcp:assets.list_docs:call",
  "mcp:assets.delete_doc:call",
  # The second gate the assets verbs enforce: the doc resource itself (id = ros/{uuid}, slash-sep so
  # it is one cap segment — a `:` would collide with the cap action delimiter). WRITE/DELETE are
  # scoped to our own `ros/*` docs; READ is `doc/*` because `assets.list_docs` authorizes against the
  # surface wildcard (`store:doc/**:read`) — it lists ids only, and each is re-read under `ros/*`.
  "store:doc/**:read",
  "store:doc/ros/*:write",
  "store:doc/ros/*:delete",
  "mcp:ingest.write:call",       # append polled present-values as series samples (slice 3)
  "mcp:series.latest:call",      # UI live value
  "mcp:series.read:call",        # UI trend chart
  "mcp:point.write:call",        # the setpoint verb (self-checked by the sidecar; slice 4)
  "mcp:outbox.enqueue:call",     # stage must-deliver point writes (slice 4)
  # The sidecar-drivable relay surface: the relay loop pulls its own due `ros` effects and marks the
  # outcome, delivering setpoints out-of-process through RosTarget (slice 4). Relay-operator caps.
  "mcp:outbox.due:call",
  "mcp:outbox.mark_delivered:call",
  "mcp:outbox.mark_failed:call",
  # The runnable poll verbs (slice 3) — each self-checked by the sidecar against this grant (the
  # inbound native.call carries no caller identity; see host.rs). arm/park/inspect/restart the loop.
  "mcp:ros.start:call",
  "mcp:ros.stop:call",
  "mcp:ros.status:call",
  "mcp:ros.restart:call",
]

# CRUD over the connection → network → device → point tree (core/resource-verbs grammar).
# One tool per verb; each gated by mcp:<tool>:call. Poll toggle = *.update {enable:false}.
[[tools]]
name = "ros.list"
description = "List ROS connections in the workspace (keyset-paged)."
[[tools]]
name = "ros.get"
description = "Get one ROS connection by uuid (token never returned)."
[[tools]]
name = "ros.create"
description = "Register a ROS appliance {name, base_url, token}; token stashed via lb-secrets."
[[tools]]
name = "ros.update"
description = "Update a ROS connection (rename / re-point / enable:false to silence its whole tree)."
[[tools]]
name = "ros.delete"
description = "Remove a ROS connection (soft by default)."
[[tools]]
name = "ros.ping"
description = "Health-check a ROS appliance (proxies /api/system/ping)."

[[tools]]
name = "network.list"
description = "List networks under a ROS connection (proxies /api/networks)."
[[tools]]
name = "network.get"
description = "Get one network by uuid."
[[tools]]
name = "network.create"
description = "Create a network on the box."
[[tools]]
name = "network.update"
description = "Update a network (enable:false silences all its devices' points)."
[[tools]]
name = "network.delete"
description = "Delete a network."

[[tools]]
name = "device.list"
description = "List devices under a network (proxies /api/devices)."
[[tools]]
name = "device.get"
description = "Get one device by uuid."
[[tools]]
name = "device.create"
description = "Create a device on the box."
[[tools]]
name = "device.update"
description = "Update a device (enable:false silences its points)."
[[tools]]
name = "device.delete"
description = "Delete a device."

[[tools]]
name = "point.list"
description = "List points under a device (proxies /api/points)."
[[tools]]
name = "point.get"
description = "Get one point by uuid (present_value, priority array, …)."
[[tools]]
name = "point.create"
description = "Create a point on the box."
[[tools]]
name = "point.update"
description = "Update a point (enable:false drops it from polling)."
[[tools]]
name = "point.delete"
description = "Delete a point."
[[tools]]
name = "point.write"
description = "Write a setpoint {slot 1-16, value|null} — must-deliver, staged as an outbox effect."

# The runnable trait for the poller (core/resource-verbs Tier 2): arm/disarm/inspect per connection.
[[tools]]
name = "ros.start"
description = "Begin polling a connection's enabled tree."
[[tools]]
name = "ros.stop"
description = "Park the poll timer for a connection."
[[tools]]
name = "ros.status"
description = "Poll health: last-ok / last-fail + sample count."
[[tools]]
name = "ros.restart"
description = "Restart a connection's poll task (stop + start)."

# [ui] — the federated shadcn page (fleet → connection → network → device → point drill-down, poll
# toggles, point-write). Added by the implementing session with the ui-federation scope, per fleet-monitor.

[visibility]
class = "private"
