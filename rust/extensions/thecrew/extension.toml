# `thecrew` — the graphics-canvas extension (parent scope
# docs/scope/frontend/graphics-canvas-scope.md, phases 1–2; build scope
# docs/thecrew-extension-scope.md in this folder). A 100%-UI extension: a data-bound
# three.js scene canvas (plant graphics & floor plans). The Rust component serves ZERO
# tools — it exists only to satisfy the loader + registry publish path (no UI-only tier).
# All real behavior lives in `ui/`, reaching data through the host-mediated bridge under
# the VIEWER's grant. Zero core additions: no new verbs, tables, caps, or WIT surface —
# a pure CONSUMER of shipped `assets.*` + `series.*` verbs.
[extension]
id          = "thecrew"
version     = "0.1.0"
name        = "Graphics"
description = "Plant graphics & floor plans: a data-bound three.js scene canvas (graphics-canvas phases 1-2)."

[runtime]
tier      = "wasm"                            # stub component, zero tools (see src/lib.rs)
world     = "lazybones:ext/extension@0.2.0"   # the @0.2.0 world; the guest imports nothing beyond it
placement = "either"                          # assets + bridge identical edge/cloud — no `if cloud`

[capabilities]
# Read/write caps the page/widget reach through the bridge; each re-checked host-side per call,
# intersected with the admin's install grant. Bindings + saves run under the VIEWER's grant.
request = [
    "mcp:assets.get_doc:call",     # load a scene
    "mcp:assets.put_doc:call",     # save a scene (editor only)
    "mcp:assets.list_docs:call",   # the scene picker
    "mcp:series.latest:call",      # binding backfill
    "mcp:series.read:call",        # sparkline/history bindings (label trends)
    "mcp:series.watch:call",       # live values via the shipped SSE
]

# The full graphics PAGE (ui-federation scope): browse/edit/create scenes. `entry` is the ESM
# remote resolved under `/extensions/thecrew/ui/remoteEntry.js`. The lib build emits
# `dist/remoteEntry.js`. `mountWidget` (below) is a SECOND export on the SAME remote (one build).
[ui]
entry = "remoteEntry.js"
label = "Graphics"
icon  = "shapes"
scope = ["assets.get_doc", "assets.put_doc", "assets.list_docs",
         "series.latest", "series.read", "series.watch"]

# The read-only scene CELL for dashboards. Its scope is deliberately NARROWER than the page's:
# a cell can render a scene and its live values but can never save one (no assets.put_doc, no
# list_docs). The remote's `mountWidget` dispatches read-only by widgetId.
[[widget]]
entry = "remoteEntry.js"
label = "Scene"
icon  = "shapes"
scope = ["assets.get_doc", "series.latest", "series.watch"]

[visibility]
class = "public"
