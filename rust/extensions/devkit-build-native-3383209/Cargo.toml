[package]
name = "devkit-build-native-3383209"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"

# This generated crate sits under rust/extensions but is not a workspace member. Path dependencies
# point at the real Lazybones crates instead of using workspace inheritance.
[workspace]

[[bin]]
name = "devkit-build-native-3383209"
path = "src/main.rs"

[dependencies]
lb-supervisor = { path = "../../crates/supervisor" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt", "macros", "io-util", "io-std"] }
