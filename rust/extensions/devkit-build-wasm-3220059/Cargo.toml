[package]
name = "devkit-build-wasm-3220059-ext"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"

# This generated crate sits under rust/extensions but is not a workspace member. The local workspace
# stanza prevents Cargo from trying to attach it to the parent Lazybones workspace.
[workspace]

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.40"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
