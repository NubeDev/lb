# `control-engine` â€” the native (Tier-2) Control Engine (CE) bridge extension
# (control-engine scope). A supervised host binary that holds the long-lived CE
# REST/WS connection (via the `rubix-ce` client crate) and serves the caps-gated
# `control-engine.*` MCP surface. Like `federation`/`echo-sidecar` it is a native
# binary for the host target, so it IS a workspace member, and it speaks the SAME
# `lb-supervisor` wire protocol over stdio.
#
# The CE client (`rubix-ce`) and its REST/WS deps live ONLY here â€” core crates link
# no CE code (control-engine scope Â§"100% extension": the core stays CE-ignorant).
[package]
name = "control-engine"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
name = "control_engine"
path = "src/lib.rs"

[[bin]]
name = "control-engine"
path = "src/main.rs"

[dependencies]
# Reuse the supervisor's wire protocol + framing verbatim â€” child and host agree on
# the ABI by sharing the crate (no drift), exactly like federation/echo-sidecar.
lb-supervisor = { workspace = true }
# The host callback transport (S4): the sidecar reaches the store (`store.write`/
# `store.query`/`store.delete` for the `ce_appliance` registry) via the node-signed
# `LB_EXT_TOKEN` over `POST /mcp/call`. Shared crate, so the callback ABI cannot drift.
lb-sidecar-client = { workspace = true }
# Parse the injected `LB_EXT_TOKEN` grant for the per-verb capability self-check (the
# inbound `native.call` carries no caller identity â€” the sidecar self-checks its grant).
lb-auth = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = "0.1"
thiserror = { workspace = true }

# The CE client crate (control-engine scope Decision: pinned git dependency, still
# update-with-approval). `rest` pulls `ws`; `CeRestClient<WsStreamTransport>::new`
# needs both. The commented path line right below is the local-dev-only override for
# side-by-side checkouts of ~/code/ce/ce-client-rust â€” never the committed default
# (a bare path dep is non-reproducible off this machine).
rubix-ce = { git = "https://github.com/NubeIO/ce-client-rust", rev = "51ab97edf32d622f94d00401aee3ae2daf8859c8", features = ["rest", "ws"] }
# rubix-ce = { path = "/home/user/code/ce/ce-client-rust", features = ["rest", "ws"] }

# Own tokio: the child reads/writes its OWN stdio (io-std) + runs the async CE client
# (rt-multi-thread). io-util for the framed reader/writer. S6 adds `time` (pump reconnect backoff) +
# `sync` (the watch-registry Mutex is std, but the fake's channel sender lives in tokio sync).
tokio = { version = "1", features = ["rt-multi-thread", "macros", "io-util", "io-std", "time", "sync"] }
# S6 COV pump consumes the `CovStream` (a `futures::Stream`) via `StreamExt::next`.
futures = { workspace = true }

# The `rubix-ce` REST/WS client (an external git dep we can't edit) pulls `reqwest` with its DEFAULT
# `default-tls` feature â†’ `native-tls` â†’ `openssl-sys`, which needs a system OpenSSL + pkg-config to
# link. This box is zig-only (no pkg-config/libssl), so that build fails. Our own crates all pin
# `reqwest` to `rustls-tls`, but Cargo unifies features across the shared `reqwest`, so `rubix-ce`'s
# `default-tls` still turns `openssl-sys` on for the whole graph. Force that single shared
# `openssl-sys` to build VENDORED (compile OpenSSL from source, no system dep) â€” the `vendored`
# feature on `openssl` forwards to `openssl-sys` and unifies globally. Mirrors federation's precedent
# (its Postgres connector has the same native-tls pull). Needs a C toolchain to compile the vendored
# source, which the zig shims (rust/.cargo/config.toml CC/AR/RANLIB) already provide.
openssl = { version = "0.10", features = ["vendored"] }

# Direct HTTP for the TOLERANT `control-engine.tree` raw fetch (`tools::raw_tree`) â€”
# bypasses `rubix-ce`'s strict `EdgeDto` decode so a dangling edge can't blank the
# canvas. Same pin/features as the rest of the workspace (rustls-tls, no default-tls);
# Cargo unifies it with the `reqwest` `rubix-ce` already pulls.
reqwest = { workspace = true }

[features]
default = []
# Compile the ONE sanctioned CE stub (`ce_fake`) INTO the binary, so the host
# integration test drives the real supervisor + real gate + real stdio ABI against a
# CE we cannot build in Rust CI (the C++20 engine). Activated per-call by the
# `LB_CE_FAKE=1` env the test sets â€” OFF by default, so a shipped binary always uses
# the real `rubix-ce` REST/WS client (CLAUDE Â§9: the fake never leaks into the real
# path). Mirrors federation's `--features postgres` build-flag precedent.
ce-fake = []

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "io-util", "io-std", "sync", "net"] }
# The S4 appliance-registry integration test drives the registry verbs against a REAL spawned gateway
# + node + store + caps (the native-callback pattern from ros/tests/crud_test.rs). No mocks.
lb-host = { workspace = true }
lb-role-gateway = { workspace = true }
lb-auth = { workspace = true }
axum = { workspace = true }
# S6 watch integration test: assert the COV frame on the real series bus subject + the durable copy.
lb-bus = { workspace = true }
lb-ingest = { workspace = true }
lb-store = { workspace = true }
