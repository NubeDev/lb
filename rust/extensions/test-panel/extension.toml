# Generated by lb-devkit. The folder is standalone source; publish still goes through signed Artifact
# verification and the host's normal install path.
[extension]
id = "test-panel"
version = "0.1.0"
name = "test-panel"
description = "Generated Lazybones extension."

[runtime]
tier = "wasm"
world = "lazybones:ext/extension@0.2.0" # pinned by the SDK so loader ABI mismatch fails at load, not at runtime
placement = "either"

[capabilities]
request = [
    "mcp:datasource.list:call",
    "mcp:federation.query:call",
    "mcp:federation.schema:call",
]

[[tools]]
name = "ping"
description = "Generated stateless ping tool."

[ui]
entry = "remoteEntry.js"
label = "test-panel"
icon = "box"
scope = ["test.panel.ping", "datasource.list", "federation.query", "federation.schema"]

[visibility]
class = "private"
