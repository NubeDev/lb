# The v2 hello WASM extension — same `echo` tool, but its output carries `"v": 2` so a test
# can prove a LIVE swap (hot-reload) actually replaced the instance. Same wasm32-wasip2
# component shape as `hello`; EXCLUDED from the workspace (it targets wasm, not the host).
# Build: cargo build --target wasm32-wasip2 --release
[package]
name = "hello-v2-ext"
version = "0.2.0"
edition = "2021"
license = "MIT OR Apache-2.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.40"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# The authoritative WIT lives in the standalone SDK. A `links` crate: its build script exposes the
# WIT path (`DEP_LB_SDK_WIT`) that this crate's `build.rs` feeds to `wit_bindgen::generate!`. A
# normal dep (not build-dep) because cargo only hands `DEP_*` metadata to a dependent whose build
# script's package links it via `[dependencies]`. Same tag lb's host pins — one contract, no drift.
lb-sdk = { git = "https://github.com/NubeDev/lb-ext-sdk", tag = "sdk-v0.2.1" }
