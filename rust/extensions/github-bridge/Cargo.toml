# The `github-bridge` WASM extension — a wasm32-wasip2 component (extensions/github-bridge-scope.md).
# EXCLUDED from the workspace (root Cargo.toml): it targets wasm, not the host platform — like
# `hello`/`hello-v2`. Build it with: cargo build --target wasm32-wasip2 --release
# (the registry tests read the built .wasm; see crates/host/tests/github_bridge_*.rs).
[package]
name = "github-bridge-ext"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.40"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# The authoritative WIT lives in the standalone SDK; a build-time dep only — its `links` build script
# exposes the WIT path (`DEP_LB_SDK_WIT`) that `build.rs` feeds to `generate!`. Pinned to the same tag
# lb's host pins, so guest and host generate from one contract.
[build-dependencies]
lb-sdk = { git = "https://github.com/NubeDev/lb-ext-sdk", tag = "sdk-v0.2.1" }
