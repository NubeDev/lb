[package]
name = "devkit-e2e-wasm-3343348-ext"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"

# This generated crate sits under rust/extensions but is not a workspace member. The local workspace
# stanza prevents Cargo from trying to attach it to the parent Lazybones workspace.
[workspace]

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.40"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# The authoritative WIT lives in the standalone SDK; a build-time dep only — its `links` build script
# exposes the WIT path (`DEP_LB_SDK_WIT`) that `build.rs` feeds to `generate!`. Pinned to the same tag
# lb's host pins, so guest and host generate from one contract.
[build-dependencies]
lb-sdk = { git = "https://github.com/NubeDev/lb-ext-sdk", tag = "sdk-v0.2.1" }
