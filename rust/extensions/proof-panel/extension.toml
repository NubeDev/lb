# `proof-panel` — a SINGLE self-contained Tier-1 WASM extension: backend tool + frontend page in ONE
# folder. The Tier-1 counterpart to `fleet-monitor` (which is native/Tier-2):
#   • BACKEND  → the wasm32-wasip2 component (`src/lib.rs`), loaded into the host's component runtime,
#                serving one real MCP tool (`proof.ping`) — no separate process, no PID.
#   • FRONTEND → a module-federated shadcn page co-located under `ui/`, reaching data ONLY through the
#                host-mediated read-only bridge.
# An extension is one thing; backend and frontend are each optional parts of it. This one ships both,
# on the lighter WASM tier — proving the Tier-1 path end to end (publish → install → load → call → UI).
[extension]
id          = "proof-panel"
version     = "0.1.0"
name        = "Proof Panel"
description = "A Tier-1 WASM component (one real MCP tool) plus a federated shadcn page — the self-contained WASM reference extension."

[runtime]
tier        = "wasm"                            # Tier 1: a WASM component in the host runtime (§6.3)
world       = "lazybones:ext/extension@0.2.0"   # uses the @0.2.0 `host.call-tool` import; major still 0 so the loader accepts it
placement   = "either"

[capabilities]
# The page reaches data only through these read-only series verbs (host re-checks each per call).
# Requested here; intersected with admin approval at install. The effective UI scope = the granted
# subset. The component's own `proof.ping` tool needs no host-side cap requested here — the grant lives
# on the CALLER's token (the hello convention; verified in crates/host/tests/proof_panel_test.rs).
# The all-features demo also writes the data it shows (`ingest.write`) and drives the durable-workflow
# surface (`outbox.status`, `inbox.list`, `inbox.resolve`). Each is re-checked by the host per call.
request = [
    "mcp:series.find:call",
    "mcp:series.latest:call",
    "mcp:series.read:call",
    "mcp:ingest.write:call",
    "mcp:outbox.status:call",
    "mcp:inbox.list:call",
    "mcp:inbox.resolve:call",
    # proof-workflow-sim: the guest's `proof.simulate` DRIVES a full inbox→approval→outbox round-trip,
    # so its intersected grant must permit the two durable-workflow WRITE verbs it produces motion with.
    "mcp:inbox.record:call",
    "mcp:outbox.enqueue:call",
    # The page's "Run derive" card invokes the ext's OWN backend tool `proof.derive` over the bridge,
    # so the cap must be in the grant — otherwise the `[ui] scope` projection (ui_decl::narrow) drops
    # `proof-panel.proof.derive` and the page's bridge filter rejects it `out_of_scope` before it ever
    # reaches the host. (The host then re-checks it server-side regardless.)
    "mcp:proof-panel.proof.derive:call",
    # The self-recursive depth-guard tool calls its OWN ext tool through the callback, so the grant
    # must include that cap (an ext tool the guest invokes is gated like any other).
    "mcp:proof-panel.proof.recurse:call",
    # The page's "Run workflow simulation" card invokes the ext's OWN backend tool `proof.simulate`
    # over the bridge, so the cap must be in the grant — otherwise `ui_decl::narrow` drops
    # `proof-panel.proof.simulate` from the `[ui] scope` and the page's bridge filter rejects it
    # `out_of_scope` before it ever reaches the host (the same bug that bit `proof.derive`).
    "mcp:proof-panel.proof.simulate:call",
]

# The tool the WASM component serves (proves the backend half is a real, reachable Tier-1 MCP tool).
[[tools]]
name        = "proof.ping"
description = "A workspace-tagged snapshot served by the WASM component — proves the Tier-1 backend tool is reachable through the cap gate."

# The host-callback proof tool: reads `proof.demo` and writes `proof.derived = value*2` via the
# `host.call-tool` import — a guest doing real platform work under its delegated `caller ∩ grant`.
[[tools]]
name        = "proof.derive"
description = "Reads the latest proof.demo (series.latest) and writes proof.derived = value*2 (ingest.write) through the host-mediated callback — proves a wasm guest can read/write the platform."

# The workflow-simulation proof tool: drives a full inbox→approval→outbox round-trip through the host
# callback — the guest PRODUCES the motion (inbox.record → inbox.resolve → outbox.enqueue) the page then
# sees, instead of only reading something else seeded.
[[tools]]
name        = "proof.simulate"
description = "Drives a full inbox→approval→outbox round-trip through the host callback (inbox.record → inbox.resolve → outbox.enqueue) — proves a wasm guest can PRODUCE durable workflow motion, visible on the page."

# A self-recursive tool — calls itself via the host callback to prove the re-entrancy depth guard
# fires ("call depth exceeded"). Not a UI verb; exists for the depth-guard regression test only.
[[tools]]
name        = "proof.recurse"
description = "Calls itself through host.call-tool; exists to prove the host bounds re-entrant guest->host->guest recursion with a depth guard."

# The PAGE this extension contributes to the sidebar (ui-federation scope). `entry` is the ESM remote
# entry, resolved under the gateway's `/extensions/proof-panel/ui/` route. The shell dynamic-imports it
# (sharing its React via the host import map) and mounts it in a cap-gated nav slot. The lib build emits
# `dist/remoteEntry.js` (no `assets/` subdir), so the served path is `…/ui/remoteEntry.js`. NO [[widget]]
# tables — widget tiles are deferred to the dashboard scope (proof-panel scope open question).
[ui]
entry = "remoteEntry.js"
label = "Proof Panel"
icon  = "shield-check"
scope = [
    "series.find",
    "series.latest",
    "ingest.write",
    "outbox.status",
    "inbox.list",
    "inbox.resolve",
    "inbox.record",
    "outbox.enqueue",
    "proof-panel.proof.derive",
    "proof-panel.proof.simulate",
]

[visibility]
class = "public"
