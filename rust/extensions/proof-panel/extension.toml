# `proof-panel` — a SINGLE self-contained Tier-1 WASM extension: backend tool + frontend page in ONE
# folder. The Tier-1 counterpart to `fleet-monitor` (which is native/Tier-2):
#   • BACKEND  → the wasm32-wasip2 component (`src/lib.rs`), loaded into the host's component runtime,
#                serving one real MCP tool (`proof.ping`) — no separate process, no PID.
#   • FRONTEND → a module-federated shadcn page co-located under `ui/`, reaching data ONLY through the
#                host-mediated read-only bridge.
# An extension is one thing; backend and frontend are each optional parts of it. This one ships both,
# on the lighter WASM tier — proving the Tier-1 path end to end (publish → install → load → call → UI).
[extension]
id          = "proof-panel"
version     = "0.1.0"
name        = "Proof Panel"
description = "A Tier-1 WASM component (one real MCP tool) plus a federated shadcn page — the self-contained WASM reference extension."

[runtime]
tier        = "wasm"                            # Tier 1: a WASM component in the host runtime (§6.3)
world       = "lazybones:ext/extension@0.1.0"   # WIT major checked at load (ABI gate) — same as hello/fleet-monitor
placement   = "either"

[capabilities]
# The page reaches data only through these read-only series verbs (host re-checks each per call).
# Requested here; intersected with admin approval at install. The effective UI scope = the granted
# subset. The component's own `proof.ping` tool needs no host-side cap requested here — the grant lives
# on the CALLER's token (the hello convention; verified in crates/host/tests/proof_panel_test.rs).
request = ["mcp:series.find:call", "mcp:series.latest:call", "mcp:series.read:call"]

# The tool the WASM component serves (proves the backend half is a real, reachable Tier-1 MCP tool).
[[tools]]
name        = "proof.ping"
description = "A workspace-tagged snapshot served by the WASM component — proves the Tier-1 backend tool is reachable through the cap gate."

# The PAGE this extension contributes to the sidebar (ui-federation scope). `entry` is the ESM remote
# entry, resolved under the gateway's `/extensions/proof-panel/ui/` route. The shell dynamic-imports it
# (sharing its React via the host import map) and mounts it in a cap-gated nav slot. The lib build emits
# `dist/remoteEntry.js` (no `assets/` subdir), so the served path is `…/ui/remoteEntry.js`. NO [[widget]]
# tables — widget tiles are deferred to the dashboard scope (proof-panel scope open question).
[ui]
entry = "remoteEntry.js"
label = "Proof Panel"
icon  = "shield-check"
scope = ["series.find", "series.latest"]

[visibility]
class = "public"
