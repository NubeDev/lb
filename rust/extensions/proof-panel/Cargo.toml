# The `proof-panel` WASM extension — the Tier-1 counterpart to the native `fleet-monitor`.
# A wasm32-wasip2 component, EXCLUDED from the host workspace (it targets wasm, not the host),
# built in its own target/. It ships ONE real MCP tool (`proof.ping`) alongside a federated
# UI page, proving a single Tier-1 extension can carry both a backend tool and a frontend.
# Build: cargo build --target wasm32-wasip2 --release
[package]
name = "proof-panel-ext"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.40"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# The authoritative WIT lives in the standalone SDK. A `links` crate: its build script exposes the
# WIT path (`DEP_LB_SDK_WIT`) that this crate's `build.rs` feeds to `wit_bindgen::generate!`. It must
# be a NORMAL dep, not a `[build-dependencies]` one: cargo hands `DEP_*` metadata to a build script
# only for its own package's normal dependencies, so declaring it as a build-dep leaves
# `DEP_LB_SDK_WIT` unset and `build.rs` panics (this is exactly what kept `proof_panel_ext.wasm`
# unbuildable — see debugging/extensions/proof-panel-wit-dep-in-wrong-section.md). Mirrors `hello`.
# Same tag lb's host pins — one contract, no drift.
lb-sdk = { git = "https://github.com/NubeDev/lb-ext-sdk", tag = "sdk-v0.2.1" }
