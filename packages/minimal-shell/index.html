<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="data:," />
    <!-- Boot flash prevention: set color-scheme before first paint -->
    <script>
      try {
        const theme = localStorage.getItem("lb.theme");
        if (theme) {
          const t = JSON.parse(theme);
          document.documentElement.style.colorScheme = t?.mode === "dark" ? "dark" : "light";
        }
      } catch {}
    </script>
    <!-- Import map: bare React → globalThis singletons (the federation contract) -->
    <script type="importmap">
      {
        "imports": {
          "react": "/shims/react.mjs",
          "react-dom": "/shims/react-dom.mjs",
          "react-dom/client": "/shims/react-dom-client.mjs",
          "react/jsx-runtime": "/shims/react-jsx-runtime.mjs"
        }
      }
    </script>
  </head>
  <body class="h-full">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
