<!doctype html>
<html lang="en" class="dark" data-theme-accent="amber">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <script>
      (() => {
        // Theme boot (no flash) — color-scheme + accent from the cache, applied before first paint.
        try {
          const raw = localStorage.getItem("lb.theme");
          const parsed = raw ? JSON.parse(raw) : {};
          const mode = parsed.mode === "light" ? "light" : "dark";
          const accent = ["amber", "teal", "blue"].includes(parsed.accent) ? parsed.accent : "amber";
          document.documentElement.classList.toggle("dark", mode === "dark");
          document.documentElement.dataset.themeAccent = accent;
          document.documentElement.style.colorScheme = mode;
        } catch {
          document.documentElement.dataset.themeAccent = "amber";
          document.documentElement.style.colorScheme = "dark";
        }
        // Branding boot (no flash) — the workspace's cached brand (`lb.brand.<ws>`) drives the tab
        // title + favicon before React mounts. The `<ws>` is parsed from the URL hash (`/t/<ws>/…`);
        // the token's real workspace is reconciled by the provider on mount, so a mismatched/stale
        // key here only means a one-round-trip neutral tab before the resolve lands. Neutral (empty)
        // title on a cache miss — the platform name is never shown.
        try {
          const m = location.hash.match(/^#?\/t\/([^/?#]+)/);
          const ws = m ? decodeURIComponent(m[1]) : "";
          if (ws) {
            const raw = localStorage.getItem("lb.brand." + ws);
            if (raw) {
              const brand = JSON.parse(raw);
              if (typeof brand.siteName === "string" && brand.siteName) document.title = brand.siteName;
              if (typeof brand.faviconDataUri === "string" && /^data:image\//.test(brand.faviconDataUri)) {
                let link = document.querySelector("link[rel='icon']");
                if (!link) {
                  link = document.createElement("link");
                  link.rel = "icon";
                  document.head.appendChild(link);
                }
                link.href = brand.faviconDataUri;
              }
            }
          }
        } catch {
          // Best-effort boot — a miss leaves the neutral title; the provider resolves on mount.
        }
      })();
    </script>
    <!-- Extension federation import map (ui-federation scope). Extension `remoteEntry.js` bundles
         externalise react/react-dom/react-dom/client/react/jsx-runtime; their bare imports resolve
         here to the host shims (`/shims/*.mjs`), which re-export the shell's SINGLE React published on
         `globalThis.__lb*` (src/features/ext-host/singletons.ts). One React across host↔extension — no
         second copy, no "Invalid hook call". Must precede the app module script so it is in the DOM
         before any remote is dynamic-imported. Replaces @originjs/vite-plugin-federation. -->
    <script type="importmap">
      {
        "imports": {
          "react": "/shims/react.mjs",
          "react-dom": "/shims/react-dom.mjs",
          "react-dom/client": "/shims/react-dom-client.mjs",
          "react/jsx-runtime": "/shims/react-jsx-runtime.mjs"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
