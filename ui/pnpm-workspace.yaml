# Single-package "workspace" — `ui/` is the only package. This file exists so pnpm has a
# root it recognizes and so we can approve the build scripts we trust. pnpm 9+ requires a
# `packages:` field here; without it `pnpm install` fails with "packages field missing or empty".
packages:
  - '.'

allowBuilds:
  esbuild: true

# Approve build scripts for these deps (pnpm blocks postinstall/build scripts by default).
onlyBuiltDependencies:
  - esbuild
