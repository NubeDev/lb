services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: lb-timescaledb
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lb_secret}
      POSTGRES_DB: ${POSTGRES_DB:-lb}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lb} -d ${POSTGRES_DB:-lb}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  timescaledb_data:
